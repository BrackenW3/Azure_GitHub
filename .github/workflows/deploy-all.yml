name: Deploy All Services
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  neo4j:
    runs-on: ubuntu-latest
    steps:
      - name: Install neo4j
        run: pip install neo4j --break-system-packages -q
      - name: Apply Neo4j schema
        env:
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        shell: python
        run: |
          import os
          from neo4j import GraphDatabase
          pw = os.environ.get('NEO4J_PASSWORD','')
          if not pw:
              print('NEO4J_PASSWORD not set')
              exit(0)
          try:
              driver = GraphDatabase.driver('bolt://neo4j-production-dafa.up.railway.app:7687', auth=('neo4j', pw))
              stmts = [
                  'CREATE CONSTRAINT user_id IF NOT EXISTS FOR (u:User) REQUIRE u.id IS UNIQUE',
                  'CREATE CONSTRAINT content_id IF NOT EXISTS FOR (c:Content) REQUIRE c.id IS UNIQUE',
                  'CREATE CONSTRAINT tag_name IF NOT EXISTS FOR (t:Tag) REQUIRE t.name IS UNIQUE',
                  'CREATE CONSTRAINT project_id IF NOT EXISTS FOR (p:Project) REQUIRE p.id IS UNIQUE',
                  "MERGE (p:Project {id:'willbracken-main'}) SET p.name='willbracken.com', p.status='active'",
                  "MERGE (p:Project {id:'n8n'}) SET p.name='n8n Automation', p.status='active'",
                  "MERGE (p:Project {id:'vector-search'}) SET p.name='Vector Search', p.status='active'",
                  "MERGE (p:Project {id:'ai-router'}) SET p.name='AI Router', p.status='in-progress'",
                  "MERGE (p:Project {id:'litellm'}) SET p.name='LiteLLM Proxy', p.status='deploying'",
                  "MERGE (p:Project {id:'langfuse'}) SET p.name='LangFuse Observability', p.status='deploying'",
                  "MERGE (p:Project {id:'metabase'}) SET p.name='Metabase Analytics', p.status='deploying'",
              ]
              with driver.session() as s:
                  for stmt in stmts:
                      try:
                          s.run(stmt)
                          print(f'OK: {stmt[:60]}')
                      except Exception as e:
                          print(f'Skip: {str(e)[:60]}')
              driver.close()
              print('Neo4j COMPLETE')
          except Exception as e:
              print(f'Connection failed: {e}')

  container-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy LiteLLM + LangFuse + Metabase
        run: |
          set -e

          # Ensure environment exists
          EXISTS=$(az containerapp env show --name willbracken-env --resource-group willbracken-free-rg --query name -o tsv 2>/dev/null || echo "")
          if [ -z "$EXISTS" ]; then
            echo "Creating environment..."
            az containerapp env create --name willbracken-env --resource-group willbracken-free-rg --location eastus
          fi
          echo "Environment ready"

          # Deploy LiteLLM
          if az containerapp show --name litellm --resource-group willbracken-free-rg &>/dev/null; then
            echo "LiteLLM already exists - updating..."
            az containerapp update --name litellm --resource-group willbracken-free-rg               --image ghcr.io/berriai/litellm:main-latest 2>&1 || true
          else
            az containerapp create --name litellm               --resource-group willbracken-free-rg               --environment willbracken-env               --image ghcr.io/berriai/litellm:main-latest               --target-port 4000 --ingress external               --min-replicas 0 --max-replicas 2               --cpu 0.5 --memory 1Gi               --env-vars                 ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"                 OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"                 AZURE_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}"                 AZURE_API_BASE="https://willbracken-aoai-ihe42a.openai.azure.com/"                 AZURE_API_VERSION="2025-01-01-preview"                 OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"                 XAI_API_KEY="${{ secrets.XAI_API_KEY }}"                 GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"                 LITELLM_MASTER_KEY="sk-wb-litellm-master"                 LITELLM_LOG="INFO"
          fi
          LITELLM_URL=$(az containerapp show --name litellm --resource-group willbracken-free-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "LiteLLM: https://$LITELLM_URL"

          # Deploy LangFuse
          if az containerapp show --name langfuse --resource-group willbracken-free-rg &>/dev/null; then
            echo "LangFuse already exists"
          else
            az containerapp create --name langfuse               --resource-group willbracken-free-rg               --environment willbracken-env               --image langfuse/langfuse:3               --target-port 3000 --ingress external               --min-replicas 0 --max-replicas 1               --cpu 0.5 --memory 1Gi               --env-vars                 DATABASE_URL="${{ secrets.COCKROACH_DB_ADMIN_CONNECTION }}"                 NEXTAUTH_SECRET="wb-langfuse-secret-2026"                 NEXTAUTH_URL="https://langfuse.willbracken.com"                 SALT="wb-langfuse-salt-2026"                 LANGFUSE_INIT_USER_EMAIL="will@willbracken.com"                 LANGFUSE_INIT_USER_PASSWORD="WillBracken2026!"                 LANGFUSE_INIT_ORG_ID="willbracken"                 LANGFUSE_INIT_ORG_NAME="WillBracken"                 LANGFUSE_INIT_PROJECT_ID="main"                 LANGFUSE_INIT_PROJECT_NAME="Main"
          fi
          LANGFUSE_URL=$(az containerapp show --name langfuse --resource-group willbracken-free-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "LangFuse: https://$LANGFUSE_URL"

          # Deploy Metabase
          if az containerapp show --name metabase --resource-group willbracken-free-rg &>/dev/null; then
            echo "Metabase already exists"
          else
            az containerapp create --name metabase               --resource-group willbracken-free-rg               --environment willbracken-env               --image metabase/metabase:latest               --target-port 3000 --ingress external               --min-replicas 0 --max-replicas 1               --cpu 1.0 --memory 2Gi               --env-vars                 MB_DB_TYPE="postgres"                 MB_DB_CONNECTION_URI="${{ secrets.COCKROACH_DB_ADMIN_CONNECTION }}"
          fi
          METABASE_URL=$(az containerapp show --name metabase --resource-group willbracken-free-rg --query properties.configuration.ingress.fqdn -o tsv)
          echo "Metabase: https://$METABASE_URL"

          echo ""
          echo "=== DEPLOYED URLs ==="
          echo "LiteLLM:  https://$LITELLM_URL"
          echo "LangFuse: https://$LANGFUSE_URL"
          echo "Metabase: https://$METABASE_URL"
          echo ""
          echo "LangFuse login: will@willbracken.com / WillBracken2026!"
          echo "LiteLLM master key: sk-wb-litellm-master"

  summary:
    needs: [neo4j, container-apps]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Neo4j:          ${{ needs.neo4j.result }}"
          echo "Container Apps: ${{ needs.container-apps.result }}"
