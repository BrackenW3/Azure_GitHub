name: Build & Deploy AI Router

on:
  push:
    branches: [main]
    paths: [apps/ai-router/**]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-router

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: apps/ai-router
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-router:latest
            ghcr.io/${{ github.repository }}/ai-router:${{ github.sha }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: |
          az containerapp update \
            --name willbracken-app \
            --resource-group willbracken-free-rg \
            --image ghcr.io/${{ github.repository }}/ai-router:${{ github.sha }}
